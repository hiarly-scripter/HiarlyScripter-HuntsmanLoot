[config]
schemaVersion = "0.0.1"

[package]
namespace = "HiarlyScripter"
name = "HuntsmanLoot"
versionNumber = "1.1.2"
description = "Faz o Huntsman largar sua espingarda ao morrer. Chance de drop configurável, suporte a multiplayer e modo berserk. Sem dependências externas além do BepInEx."
websiteUrl = "https://discord.com/users/hiarly_ferreira"
containsNsfwContent = false

[package.dependencies]
"BepInEx-BepInExPack" = "5.4.2100"

[build]
icon = "./package/icon.png"
readme = "./package/README.md"
outdir = "./build"

[[build.copy]]
source = "./package/plugins"
target = ""

[publish]
repository = "https://thunderstore.io"
communities = [ "repo", ]

[publish.categories]
repo = [ "mods", "monsters", "weapons", "items", "serverside", "ai-generated", ]
